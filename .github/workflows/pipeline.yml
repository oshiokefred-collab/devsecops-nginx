name: DevSecOps Pipeline with Terraform

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_IMAGE: spygee/devsecops-nginx
  DOCKER_TAG: v1.0
  AWS_REGION: us-east-1

jobs:
  # ---------- Terraform (optional, runs only when terraform/ files changed) ----------
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      contains(github.event.head_commit.modified, 'terraform/')
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch'
        working-directory: terraform
        run: terraform apply -auto-approve

  # ---------- DevSecOps (runs on every push, independent) ----------
  devsecops:
    name: Build, Secure & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks Secret Scan
        uses: zricethezav/gitleaks-action@v2
        continue-on-error: false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}

      - uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          only-severities: critical,high
          exit-code: true
        env:
          DOCKER_SCOUT_HUB_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_SCOUT_HUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate SBOM
        run: |
          docker scout sbom --format spdx \
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} > sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: |
            sbom.spdx.json
            docker-scout-report.txt

      - name: Push to Docker Hub
        run: docker push ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull spygee/devsecops-nginx:v1.0
            docker stop nginx || true
            docker rm nginx || true
            docker run -d \
              --name nginx \
              -p 80:8080 \
              --restart unless-stopped \
              spygee/devsecops-nginx:v1.0
